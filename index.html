<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cyprus Golf Tour '26 Live Score Card</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="./config.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    :root{
      --bg:#f0ede4; --card:#ffffff; --ink:#16321f; --muted:#6b7c6e; --line:#e0ddd4;
      --green:#0b6b3a; --green-dark:#063d22; --green-deeper:#042e19;
      --gold:#f0c040; --gold-dark:#c99a10; --cream:#f8f5e8;
      --shadow:0 4px 24px rgba(11,107,58,0.10);
      --radius:16px;
    }
    *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
    html,body{height:100%}
    body{
      margin:0;font-family:'Inter',sans-serif;color:var(--ink);
      background:var(--bg);
    }

    /* ── LOGIN SCREEN ── */
    .login-screen{
      min-height:100vh;
      background:
        linear-gradient(to bottom, rgba(4,30,16,.55) 0%, rgba(4,30,16,.2) 40%, rgba(4,30,16,.75) 100%),
        url('https://images.unsplash.com/photo-1587174486073-ae5e5cff23aa?w=900&q=80&auto=format&fit=crop') center/cover no-repeat;
      display:flex;flex-direction:column;
      padding-bottom:0;
    }
    .login-screen .app-bar{background:transparent;box-shadow:none;position:relative}
    .login-screen-body{
      flex:1;display:flex;flex-direction:column;justify-content:flex-end;
      padding:16px 16px 32px;max-width:480px;margin:0 auto;width:100%;
    }
    .login-title-block{text-align:center;margin-bottom:24px;color:white}
    .login-title-block .trophy{font-size:48px;margin-bottom:8px;filter:drop-shadow(0 4px 12px rgba(0,0,0,.5))}
    .login-title-block h1{font-family:'Playfair Display',serif;font-size:28px;font-weight:900;color:white;text-shadow:0 2px 12px rgba(0,0,0,.5);line-height:1.15}
    .login-title-block p{font-size:13px;color:rgba(255,255,255,.75);margin-top:6px;font-weight:600;letter-spacing:.04em;text-transform:uppercase}
    .login-float-card{
      background:white;border-radius:24px;padding:24px;
      box-shadow:0 20px 60px rgba(0,0,0,.4);
    }

    /* ── APP BAR ── */
    .app-bar{
      background:linear-gradient(135deg, var(--green-dark) 0%, var(--green-deeper) 100%);
      color:white;
      padding:0 16px;
      display:flex;align-items:center;justify-content:space-between;
      height:64px;
      position:sticky;top:0;z-index:100;
      box-shadow:0 2px 12px rgba(0,0,0,.25);
      flex-shrink:0;
    }
    .app-bar-left{display:flex;align-items:center;gap:10px}
    .app-bar-flag{font-size:28px;line-height:1}
    .app-bar-title{line-height:1.15}
    .app-bar-title strong{display:block;font-family:'Playfair Display',serif;font-size:17px;font-weight:900;letter-spacing:.01em;color:white}
    .app-bar-title span{font-size:11px;color:rgba(255,255,255,.65);font-weight:600;letter-spacing:.04em;text-transform:uppercase}
    .app-bar-right{display:flex;align-items:center;gap:8px}
    .app-bar-sync{background:rgba(240,192,64,.18);border:1px solid rgba(240,192,64,.4);color:var(--gold);font-size:11px;font-weight:800;padding:5px 10px;border-radius:999px;letter-spacing:.04em}
    .app-bar-user{font-size:13px;font-weight:800;color:var(--gold);display:flex;align-items:center;gap:5px}

    /* ── DAY TABS ── */
    .day-tabs{
      background:var(--green-dark);
      display:flex;gap:0;
      padding:0 12px 12px;
      overflow-x:auto;scrollbar-width:none;
    }
    .day-tabs::-webkit-scrollbar{display:none}
    .day-tabs button{
      flex:0 0 auto;padding:9px 20px;border-radius:999px;border:none;
      font-size:13px;font-weight:800;letter-spacing:.04em;text-transform:uppercase;
      background:rgba(255,255,255,.1);color:rgba(255,255,255,.7);
      cursor:pointer;transition:all .15s;white-space:nowrap;
    }
    .day-tabs button.active{background:var(--gold);color:var(--green-deeper)}
    .day-tabs button:not(.active):hover{background:rgba(255,255,255,.18);color:white}

    /* ── SCROLL BODY ── */
    .wrap{max-width:640px;margin:0 auto;padding:16px;width:100%;flex:1}

    /* ── CARDS ── */
    h1,h2,h3,h4,p{margin:0}
    .card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:18px;margin-bottom:14px;box-shadow:var(--shadow)}
    .card-title{display:flex;align-items:center;gap:8px;font-family:'Playfair Display',serif;font-size:18px;font-weight:700;color:var(--ink);margin-bottom:4px}
    .card-title .icon{font-size:20px}
    .sub{color:var(--muted);margin-top:4px;font-size:13px;line-height:1.45}

    /* ── STATUS ── */
    .status{padding:10px 14px;border-radius:12px;font-weight:700;font-size:13px;margin-bottom:12px;background:#eef5ef;border:1px solid #d6e7d9;color:var(--green-dark)}
    .status.ok{background:#ebf8ef;border-color:#cde7d6}
    .status.bad{background:#fff0ed;border-color:#f1c8c1;color:#9b2f24}
    .hidden{display:none!important}

    /* ── LOGIN CARD ── */
    .login-card{border-radius:20px;padding:24px}
    .login-card h2{font-family:'Playfair Display',serif;font-size:26px;font-weight:900}
    .label{font-size:12px;font-weight:700;color:var(--muted);margin-bottom:6px;letter-spacing:.03em;text-transform:uppercase}
    input,select{width:100%;border-radius:12px;border:1.5px solid var(--line);padding:13px 14px;font-size:16px;background:white;color:var(--ink);font-family:'Inter',sans-serif}
    input:focus,select:focus{outline:none;border-color:var(--green)}
    select{appearance:auto;-webkit-appearance:menulist}
    button{cursor:pointer;font-weight:800;font-family:'Inter',sans-serif}
    .btn-primary{
      width:100%;padding:16px;border-radius:14px;border:none;
      background:var(--green-dark);color:var(--gold);
      font-size:15px;font-weight:900;letter-spacing:.08em;text-transform:uppercase;
      box-shadow:0 4px 16px rgba(6,61,34,.3);
    }
    .btn-secondary{background:white;color:var(--green);border:1.5px solid var(--line);border-radius:12px;padding:12px 14px;font-size:14px}
    .login-security{background:var(--cream);border:1px solid #e8e0c8;border-radius:12px;padding:14px;display:flex;gap:12px;align-items:flex-start;margin-top:14px}
    .login-security .icon{font-size:22px;flex-shrink:0;margin-top:1px}
    .login-security strong{font-size:14px;display:block;color:var(--ink)}
    .login-security span{font-size:12px;color:var(--muted)}

    /* ── TEAM PILLS ── */
    .pill{display:inline-flex;align-items:center;gap:5px;padding:5px 10px;border-radius:999px;font-size:12px;font-weight:700}
    .teamA{background:#e6f4eb;color:var(--green)}
    .teamB{background:#fff0df;color:#8c4a12}
    .pill-outline{background:transparent;border:1px solid var(--line);color:var(--muted)}

    /* ── SCORE SECTION HEADER ── */
    .score-section-header{
      background:var(--green-dark);color:white;
      border-radius:14px;padding:14px 16px;
      display:grid;grid-template-columns:1fr 1fr 1fr;gap:4px;
      margin-bottom:12px;text-align:center;
    }
    .score-section-header .sh-label{font-size:10px;font-weight:800;letter-spacing:.06em;text-transform:uppercase;color:rgba(255,255,255,.6);margin-bottom:2px}
    .score-section-header .sh-val{font-size:26px;font-weight:900;color:var(--gold);line-height:1}

    /* ── HOLE TILE GRID ── */
    .hole-half-label{font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);margin:12px 0 6px;padding-left:2px}
    .hole-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:4px}
    .hole-tile{
      background:white;border:1.5px solid var(--line);border-radius:14px;
      padding:10px 8px 8px;display:flex;flex-direction:column;align-items:center;gap:4px;
      position:relative;
    }
    .hole-tile-top{display:flex;justify-content:space-between;width:100%;font-size:10px;font-weight:800;color:var(--muted);letter-spacing:.02em}
    .hole-tile-btn{
      width:100%;padding:12px 4px;border-radius:10px;border:1.5px solid var(--line);
      background:#f8f6ef;font-size:20px;font-weight:900;color:var(--ink);
      cursor:pointer;text-align:center;transition:transform .1s;
      -webkit-tap-highlight-color:transparent;
    }
    .hole-tile-btn:active{transform:scale(.94)}
    .hole-tile-btn.empty{color:#ccc}
    .hole-tile-btn.has-score{background:white;border-color:#b8d4be}
    .hole-tile-btn.good{background:#e6f4eb;border-color:#8dc8a0;color:var(--green)}
    .hole-tile-btn.great{background:var(--green);border-color:var(--green);color:white}
    .hole-tile-btn.blob{background:#fff0df;border-color:#e8c878;color:#8c4a12}
    .hole-tile-pts{font-size:11px;font-weight:800;color:var(--muted)}
    .hole-tile-pts.pos{color:var(--green)}

    /* ── SUMMARY STRIP ── */
    .summary-strip{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-top:12px}
    .summary-box{background:var(--cream);border:1px solid var(--line);border-radius:12px;padding:10px;text-align:center}
    .summary-box .k{color:var(--muted);font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.04em}
    .summary-box .v{font-size:20px;font-weight:900;margin-top:3px;color:var(--ink)}
    .summary-box.highlight .v{color:var(--green)}

    /* ── MATCH CARD ── */
    .match-card{border:1px solid var(--line);border-radius:14px;padding:14px;background:white;margin-bottom:10px}
    .match-result{font-weight:900;color:var(--green);font-size:15px;margin-top:6px}
    .hole-chips{margin-top:8px;display:flex;flex-wrap:wrap;gap:4px}
    .hole-chip{display:inline-flex;align-items:center;padding:4px 8px;border-radius:999px;font-size:11px;font-weight:800}
    .hole-A{background:#e6f4eb;color:var(--green)}
    .hole-B{background:#fff0df;color:#8c4a12}
    .hole-H{background:#f2f0e8;color:#6b7c6e}

    /* ── COMP SUMMARY BANNER ── */
    .comp-summary{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:14px}
    .comp-block{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:14px}
    .comp-block h4{font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);margin-bottom:10px}
    .team-score-row{display:flex;align-items:center;justify-content:space-between;padding:8px 12px;border-radius:10px;margin-bottom:6px;font-weight:800;font-size:14px}
    .team-score-row.leading{background:var(--green);color:white}
    .team-score-row.trailing,.team-score-row.tied{background:var(--cream);color:var(--ink)}
    .lb-row{display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid var(--line);font-size:13px}
    .lb-row:last-child{border-bottom:none}
    .lb-pos{font-weight:900;color:var(--muted);width:18px;flex-shrink:0}
    .lb-name{font-weight:800;flex:1}
    .lb-pts{font-weight:900;color:var(--green)}
    .lb-prize{font-size:11px;color:var(--muted)}
    .my-match-text{font-size:14px;font-weight:900;color:var(--green);margin-top:6px}
    .my-match-sub{font-size:12px;color:var(--muted);margin-top:3px}

    /* ── VIEW TOGGLE ── */
    .view-toggle{display:flex;gap:8px;margin-bottom:14px}
    .view-toggle button{flex:1;padding:10px;font-size:13px;font-weight:800;border-radius:12px;border:1.5px solid var(--line);background:white;color:var(--green)}
    .view-toggle button.active{background:var(--green);color:white;border-color:var(--green)}

    /* ── TABLES (leaderboard, overall) ── */
    table{width:100%;border-collapse:collapse}
    th,td{padding:10px 8px;border-bottom:1px solid var(--line);text-align:left;font-size:13px;vertical-align:middle}
    th{background:var(--cream);color:var(--green-dark);font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.04em;position:sticky;top:0}
    .money{font-weight:900;color:var(--green)}
    .row{display:grid;gap:12px}
    .cols-2{grid-template-columns:repeat(2,minmax(0,1fr))}

    /* ── PLAYER CARD ── */
    .player-card{border:1px solid var(--line);border-radius:16px;padding:16px;background:white;margin-bottom:12px}
    .player-header{display:flex;justify-content:space-between;gap:12px;align-items:flex-start;margin-bottom:14px}
    .player-name{font-family:'Playfair Display',serif;font-size:22px;font-weight:900;line-height:1.1}
    .meta{font-size:13px;color:var(--muted);margin-top:5px;line-height:1.35}
    .points-badge{min-width:80px;text-align:center;background:var(--green-dark);color:white;padding:10px 14px;border-radius:14px;font-weight:900;font-size:24px;line-height:1}
    .points-badge span{display:block;font-size:10px;opacity:.75;margin-top:4px;letter-spacing:.06em;text-transform:uppercase}

    /* ── SCORE MODAL ── */
    .modal-backdrop{position:fixed;inset:0;background:rgba(4,30,16,.6);display:flex;align-items:flex-end;justify-content:center;padding:12px;z-index:1000;backdrop-filter:blur(3px)}
    .modal{width:min(520px,100%);background:white;border-radius:24px 24px 20px 20px;padding:20px;border:1px solid var(--line);box-shadow:0 -4px 40px rgba(0,0,0,.2)}
    .modal-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:16px}
    .modal-header h3{font-family:'Playfair Display',serif;font-size:20px;font-weight:900}
    .score-buttons{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;margin-top:4px}
    .score-btn{padding:16px 8px;font-size:18px;font-weight:900;border-radius:12px;border:1.5px solid var(--line);background:#f8f6ef;color:var(--ink);transition:all .1s}
    .score-btn:active{transform:scale(.95)}
    .score-btn.alt{background:#fff7e1;border-color:#ebd28e;color:#8c4a12}
    .score-btn.soft{background:#f0f0f0;color:var(--muted)}
    .score-btn.primary{background:var(--green-dark);color:var(--gold);border-color:var(--green-dark);font-size:14px}
    .small-note{font-size:12px;color:var(--muted);margin-top:10px;text-align:center}

    /* ── BOTTOM NAV ── */
    .bottom-nav{
      position:fixed;bottom:0;left:0;right:0;z-index:200;
      background:var(--green-deeper);
      display:flex;border-top:1px solid rgba(255,255,255,.08);
      height:72px;padding:0 4px;
      box-shadow:0 -4px 20px rgba(0,0,0,.3);
    }
    .bottom-nav button{
      flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
      gap:3px;border:none;background:transparent;color:rgba(255,255,255,.5);
      font-size:10px;font-weight:700;letter-spacing:.04em;text-transform:uppercase;
      padding:8px 4px;border-radius:0;transition:color .15s;
    }
    .bottom-nav button .nav-icon{font-size:20px;line-height:1}
    .bottom-nav button.active{color:var(--gold)}
    .bottom-nav button:not(.active):hover{color:rgba(255,255,255,.8)}

    /* ── IDENTITY BAR ── */
    .identity-bar{display:flex;justify-content:space-between;align-items:center;gap:12px;flex-wrap:wrap;margin-bottom:14px}
    .identity-name{font-family:'Playfair Display',serif;font-size:20px;font-weight:900}
    .identity-sub{font-size:12px;color:var(--muted);margin-top:2px}

    @media(max-width:640px){
      .comp-summary{grid-template-columns:1fr}
      .summary-strip{grid-template-columns:repeat(2,1fr)}
      .score-section-header .sh-val{font-size:22px}
      .cols-2{grid-template-columns:1fr}
    }
    /* ── COURSE EDITOR ── */
    .course-editor-tabs{display:flex;gap:8px;margin-bottom:16px}
    .course-editor-tabs button{flex:1;padding:10px;font-size:13px;font-weight:800;border-radius:12px;border:1.5px solid var(--line);background:white;color:var(--green)}
    .course-editor-tabs button.active{background:var(--green);color:white;border-color:var(--green)}
    .course-meta-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px}
    .course-meta-grid .full{grid-column:1/-1}
    .field-group label{display:block;font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.04em;color:var(--muted);margin-bottom:5px}
    .field-group input{padding:11px 12px;font-size:15px;border-radius:10px}
    .hole-editor-table{width:100%;border-collapse:separate;border-spacing:0 4px}
    .hole-editor-table thead th{font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.05em;color:var(--muted);padding:4px 6px;text-align:center}
    .hole-editor-table thead th:first-child{text-align:left}
    .hole-editor-table tbody tr{background:white;border-radius:10px}
    .hole-editor-table tbody td{padding:4px 4px;vertical-align:middle}
    .hole-editor-table tbody td:first-child{font-size:12px;font-weight:800;color:var(--muted);padding-left:8px;width:40px}
    .hole-editor-table tbody td input{padding:8px 4px;font-size:14px;font-weight:700;text-align:center;border-radius:8px;border:1.5px solid var(--line);background:#f8f6ef}
    .hole-editor-table tbody td input:focus{outline:none;border-color:var(--green);background:white}
    .par3-row td input[name="par"]{color:#2a7ab5}
    .par5-row td input[name="par"]{color:#8c4a12}
    .save-banner{background:#ebf8ef;border:1px solid #cde7d6;color:var(--green-dark);border-radius:12px;padding:12px 14px;font-weight:700;font-size:13px;margin-top:12px;display:none;align-items:center;gap:8px}
    .save-banner.show{display:flex}
    /* ── PROGRESS BAR ── */
    .progress-bar-wrap{background:#e8f0ea;border-radius:999px;height:8px;margin:10px 0 4px;overflow:hidden}
    .progress-bar-fill{background:linear-gradient(90deg,var(--green),#2ecc71);height:100%;border-radius:999px;transition:width .4s ease}
    .progress-label{font-size:11px;font-weight:800;color:var(--muted);display:flex;justify-content:space-between;margin-bottom:2px}

    /* ── MATCH STATUS BANNER ── */
    .match-banner{
      border-radius:14px;padding:12px 16px;margin-bottom:10px;
      display:flex;align-items:center;justify-content:space-between;gap:8px;
      background:var(--green-dark);color:white;
    }
    .match-banner.halved{background:var(--cream);color:var(--ink);border:1px solid var(--line)}
    .match-banner-status{font-size:15px;font-weight:900}
    .match-banner-sub{font-size:11px;opacity:.75;margin-top:2px}
    .match-banner-holes{font-size:13px;font-weight:800;opacity:.85;white-space:nowrap}

    /* ── SAVE FLASH ANIMATION ── */
    @keyframes flashGreen{0%{background:var(--green)}50%{background:#2ecc71}100%{background:var(--green)}}
    .hole-tile-btn.saving{animation:flashGreen .4s ease}
    @keyframes popIn{0%{transform:scale(0.7);opacity:0}60%{transform:scale(1.15)}100%{transform:scale(1);opacity:1}}
    .hole-tile-btn.saved-pop{animation:popIn .3s ease forwards}

    /* ── LEADERBOARD HIGHLIGHT ── */
    .lb-me{background:var(--cream);border-radius:10px;padding:6px 8px;margin:-2px -4px}
    tr.me-row td{background:#f0faf3;font-weight:900}
    tr.me-row td:first-child{border-left:3px solid var(--green)}

    /* ── ACTIVITY FEED ── */
    .activity-feed{margin-bottom:14px}
    .activity-feed-inner{display:flex;flex-direction:column;gap:6px}
    .activity-item{display:flex;align-items:center;gap:10px;padding:8px 12px;background:white;border:1px solid var(--line);border-radius:12px;font-size:12px;animation:slideIn .3s ease}
    @keyframes slideIn{from{opacity:0;transform:translateY(-6px)}to{opacity:1;transform:translateY(0)}}
    .activity-icon{font-size:16px;flex-shrink:0}
    .activity-text{flex:1;color:var(--ink);font-weight:600}
    .activity-time{color:var(--muted);font-size:11px;white-space:nowrap}

    /* ── DARK MODE ── */
    body.dark{--bg:#0d1f14;--card:#162b1e;--ink:#e8f5ee;--muted:#7aad8a;--line:#1e3828;--cream:#1a2e22;--shadow:0 4px 24px rgba(0,0,0,.4)}
    body.dark .hole-tile-btn{background:#1a2e22;color:#e8f5ee}
    body.dark .hole-tile{background:#162b1e;border-color:#1e3828}
    body.dark table{color:#e8f5ee}
    body.dark th{background:#1a2e22}
    body.dark input,body.dark select{background:#1a2e22;color:#e8f5ee;border-color:#1e3828}
    body.dark .match-card,body.dark .player-card,body.dark .comp-block,body.dark .summary-box{background:#162b1e;border-color:#1e3828}
    body.dark .login-float-card{background:#162b1e}
    body.dark .login-security{background:#1a2e22;border-color:#1e3828}
    .dark-toggle{background:transparent;border:1px solid rgba(255,255,255,.2);color:rgba(255,255,255,.7);padding:5px 9px;border-radius:999px;font-size:16px;width:auto;line-height:1}

    /* ── SHARE CARD ── */

<script>
const PLAYERS = [

];
let COURSES = {
  day1:{name:"PGA National Cyprus",par:71,rating:68.8,slope:126,allowance:95,holes:[{par:4,si:18},{par:4,si:10},{par:4,si:8},{par:4,si:4},{par:3,si:16},{par:5,si:6},{par:3,si:14},{par:4,si:2},{par:4,si:12},{par:5,si:11},{par:4,si:5},{par:3,si:15},{par:4,si:3},{par:4,si:17},{par:3,si:1},{par:4,si:7},{par:3,si:13},{par:5,si:9}]},

  day3:{name:"Limassol Greens",par:71,rating:72.5,slope:149,allowance:100,holes:[{par:5,si:8},{par:4,si:12},{par:3,si:14},{par:4,si:4},{par:3,si:18},{par:4,si:2},{par:4,si:16},{par:3,si:10},{par:5,si:6},{par:4,si:9},{par:3,si:13},{par:4,si:7},{par:4,si:1},{par:5,si:11},{par:4,si:17},{par:5,si:3},{par:3,si:15},{par:4,si:5}]}

const DAY_GAMES = {
  day1:[{name:"Game 1",a:["rob","eytan"],b:["bradley","steven"]},{name:"Game 2",a:["jonathan","ian"],b:["richard","garyr"]},{name:"Game 3",a:["garyd","mitchell"],b:["scott","simon"]}],
  day2:[{name:"Game 1",a:["rob","ian"],b:["richard","simon"]},{name:"Game 2",a:["eytan","garyd"],b:["bradley","garyr"]},{name:"Game 3",a:["jonathan","mitchell"],b:["steven","scott"]}]
};
const DAY3_GROUPS = [];
const DAILY_PRIZES = [50,40,30,20], OVERALL_PRIZES = [150,100,50];

let sb = null, channel = null;
let state = { tournamentId:null, tournamentSlug:null, currentPlayerId:null, isAdmin:false, adminCode:"", scoreMap:{} };
let modalState = { day:null, playerId:null, holeNo:null };
let _summaryCache = {};
let activityFeed = []; // [{text, icon, time}]
let pendingScores = []; // offline queue
let isDark = false;

// ── Utility ──
function $(id){ return document.getElementById(id); }
function getPlayer(id){ return PLAYERS.find(p => p.id === id); }
function roundHalfUp(v){ return Math.floor(v + 0.5); }
function formatMoney(v){ return "€" + Number(v || 0).toFixed(0); }
function courseHandicap(hi, c){ return roundHalfUp(hi * (c.slope / 113) + (c.rating - c.par)); }
function playingHandicap(ch, allowance){ return roundHalfUp(ch * (allowance / 100)); }
function shotsOnHole(ph, si){ if (ph <= 0) return 0; const base = Math.floor(ph / 18), rem = ph % 18; return base + (rem >= si ? 1 : 0); }
function stablefordPoints(raw, hole, shots){
  if (raw === null || raw === undefined || raw === "") return null;
  const txt = String(raw).trim().toUpperCase();
  if (txt === "X" || txt === "BLOB" || txt === "0") return 0;
  const gross = parseInt(txt, 10); if (isNaN(gross)) return null;
  const maxGross = hole.par + shots + 2; if (gross > maxGross) return 0;
  const net = gross - shots; return Math.max(0, 2 + (hole.par - net));
}
function grossValue(raw){ const txt = String(raw || "").trim().toUpperCase(); if (!txt || txt === "X" || txt === "BLOB" || txt === "0") return null; const n = parseInt(txt,10); return isNaN(n) ? null : n; }
function countbackArray(hp){ hp = hp.map(v => v ?? 0); return [hp.slice(9).reduce((a,b)=>a+b,0), hp.slice(12).reduce((a,b)=>a+b,0), hp.slice(15).reduce((a,b)=>a+b,0), hp.slice(17).reduce((a,b)=>a+b,0)]; }
function compareCountback(a,b){ for(let i=0;i<a.length;i++){ if (b[i] !== a[i]) return b[i]-a[i]; } return 0; }
function setStatus(text, cls=""){ const box = $("statusBox"); if(!box) return; box.className = "status" + (cls ? " " + cls : ""); box.textContent = text; }
function scoreValue(day, playerId, holeNo){ return state.scoreMap[`${day}:${playerId}:${holeNo}`] ?? ""; }
function canEditPlayer(playerId){
  const adminId = window._adminPlayerId || "mitchell";
  if(state.currentPlayerId === adminId || state.isAdmin) return true;
  const me = state.currentPlayerId;
  if(!me) return false;
  const myTeam = getPlayer(me) ? getPlayer(me).team : null;
  const theirTeam = getPlayer(playerId) ? getPlayer(playerId).team : null;
  // Traditional golf: you score for the OPPOSING team only
  if(!myTeam || !theirTeam || myTeam === theirTeam) return false;
  const scorers = window._scorers || {};
  // Check day1/day2 game assignments
  for(var day of ["day1","day2","day3"]){
    const games = DAY_GAMES[day] || [];
    for(var gi=0; gi<games.length; gi++){
      const game = games[gi];
      const allInGame = [...game.a, ...game.b];
      if(!allInGame.includes(playerId) || !allInGame.includes(me)) continue;
      const key = day+'_game'+gi;
      const sc = scorers[key] || {};
      if(myTeam==="A" && sc.A===me && theirTeam==="B") return true;
      if(myTeam==="B" && sc.B===me && theirTeam==="A") return true;
    }
  }
  return false;
}

// ── Dark mode ──
function toggleDark(){
  isDark = !isDark;
  document.body.classList.toggle("dark", isDark);
  localStorage.setItem("cyprusDark", isDark ? "1" : "");
  const btn = document.querySelector(".dark-toggle");
  if(btn) btn.textContent = isDark ? "☀️" : "🌙";
}

// ── Offline support ──
function setupOfflineDetection(){
  const toast = $("offlineToast");
  window.addEventListener("online",  () => { if(toast) toast.classList.remove("show"); flushPendingScores(); });
  window.addEventListener("offline", () => { if(toast) toast.classList.add("show"); });
  if(!navigator.onLine && toast) toast.classList.add("show");
}
async function flushPendingScores(){
  if(!pendingScores.length) return;
  const queue = [...pendingScores]; pendingScores = [];
  for(const s of queue){
    try{ await secureUpsertScore(s.day, s.playerId, s.holeNo, s.value); }
    catch(e){ pendingScores.push(s); }
  }
  if(!pendingScores.length) setStatus("Synced offline scores.", "ok");
}

// ── Activity feed ──
function pushActivity(icon, text){
  const now = new Date();
  const timeStr = now.getHours().toString().padStart(2,'0') + ":" + now.getMinutes().toString().padStart(2,'0');
  activityFeed.unshift({icon, text, time:timeStr});
  if(activityFeed.length > 8) activityFeed.pop();
  renderActivityFeed();
}
function renderActivityFeed(){
  const el = $("activityFeedInner");
  if(!el) return;
  el.innerHTML = activityFeed.map(a =>
    `<div class="activity-item"><span class="activity-icon">${a.icon}</span><span class="activity-text">${a.text}</span><span class="activity-time">${a.time}</span></div>`
  ).join("");
}

// ── Navigation ──
function showSection(id){
  const adminId = window._adminPlayerId || "mitchell";
  if(id === "setup" && state.currentPlayerId !== adminId) return;
  document.querySelectorAll(".section").forEach(el => el.classList.add("hidden"));
  $(id).classList.remove("hidden");
  document.querySelectorAll("#dayTabs button").forEach(btn => btn.classList.remove("active"));
  $("tab_"+id).classList.add("active");
  document.querySelectorAll(".bottom-nav button").forEach(btn => btn.classList.remove("active"));
  const bn = $("bnav_"+id); if(bn) bn.classList.add("active");
}
function populatePlayers(){ $("playerSelect").innerHTML = PLAYERS.map(p => `<option value="${p.id}">${p.first}</option>`).join(""); }
function toggleAdminField(){ $("adminCodeField").style.display = $("playerSelect").value === "mitchell" ? "block" : "none"; }

// ── Supabase ──
async function initSupabase(){
  if(sb) return true; // already initialised on page load
  if (!window.APP_CONFIG || !window.APP_CONFIG.supabaseUrl || !window.APP_CONFIG.supabaseAnonKey){ setStatus("Add your Supabase values to config.js first.", "bad"); return false; }
  sb = window.supabase.createClient(window.APP_CONFIG.supabaseUrl, window.APP_CONFIG.supabaseAnonKey); return true;
}
async function loadTournament(code){ const { data, error } = await sb.from("tournaments").select("id,name,slug").eq("slug", code).single(); if (error) throw error; return data; }
async function loadScores(){ const { data, error } = await sb.from("scores_public").select("*").eq("tournament_slug", state.tournamentSlug); if (error) throw error; state.scoreMap = {}; (data||[]).forEach(row => state.scoreMap[`${row.day_key}:${row.player_id}:${row.hole_no}`] = row.score_value); }
async function secureSignIn(){
  const params = { p_tournament_slug:$("tournamentCodeInput").value.trim(), p_player_id:$("playerSelect").value, p_admin_code:$("adminCodeInput").value.trim() || null };
  const { data, error } = await sb.rpc("sign_in_secure_nopin", params); if (error) throw error; return data;
}
async function secureUpsertScore(day, playerId, holeNo, value){
  const params = { p_tournament_slug:state.tournamentSlug, p_player_id:playerId, p_day_key:day, p_hole_no:holeNo, p_score_value:String(value||"").trim(), p_admin_code:state.adminCode || null };
  const { data, error } = await sb.rpc("upsert_score_nopin", params); if (error) throw error; return data;
}

// ── Calculations ──
function playerSummary(day, playerId){
  const key = `${day}:${playerId}`;
  if (_summaryCache[key]) return _summaryCache[key];
  const p = getPlayer(playerId), c = COURSES[day], ch = courseHandicap(p.hi, c), ph = playingHandicap(ch, c.allowance);
  let total=0,gross=0,holesEntered=0; const holePoints=[];
  for(let i=0;i<18;i++){ const raw = scoreValue(day, playerId, i+1), shots = shotsOnHole(ph, c.holes[i].si), pts = stablefordPoints(raw, c.holes[i], shots); holePoints.push(pts); if (pts!==null) total += pts; const g = grossValue(raw); if (g!==null){ gross += g; holesEntered += 1; } else if (String(raw).trim().toUpperCase()==="X" || String(raw).trim()==="0") holesEntered += 1; }
  const result = { player:p, ch, ph, total, gross, holesEntered, holePoints, countback:countbackArray(holePoints) };
  _summaryCache[key] = result;
  return result;
}
function sortedDaily(day){
  const rows = PLAYERS.map(p => playerSummary(day, p.id));
  rows.sort((a,b) => { if (b.total !== a.total) return b.total - a.total; const cb = compareCountback(a.countback, b.countback); if (cb !== 0) return cb; return a.gross - b.gross; });
  const played = rows.filter(r => r.holesEntered > 0);
  rows.forEach(r => { r.position = "—"; r.money = 0; });
  played.forEach((r, idx) => { r.position = idx + 1; r.money = idx < 4 ? DAILY_PRIZES[idx] : 0; });
  return rows;
}
function overallSorted(){
  const d1 = Object.fromEntries(sortedDaily("day1").map(r => [r.player.id, r])), d2 = Object.fromEntries(sortedDaily("day2").map(r => [r.player.id, r])), d3 = Object.fromEntries(sortedDaily("day3").map(r => [r.player.id, r]));
  const rows = PLAYERS.map(p => ({ player:p, d1:d1[p.id].total, d2:d2[p.id].total, d3:d3[p.id].total, total:d1[p.id].total + d2[p.id].total + d3[p.id].total }));
  rows.sort((a,b) => { if (b.total !== a.total) return b.total - a.total; if (b.d3 !== a.d3) return b.d3 - a.d3; if (b.d2 !== a.d2) return b.d2 - a.d2; return b.d1 - a.d1; });
  const playedOverall = rows.filter(r => r.total > 0);
  rows.forEach(r => r.money = 0);
  playedOverall.forEach((r, idx) => { if (idx < 3) r.money = OVERALL_PRIZES[idx]; });
  return rows;
}
function teamTotals(){ const overall = overallSorted(), sums = {A:0,B:0}; overall.forEach(r => sums[r.player.team] += r.total); return sums; }
function teamMembers(tag){ return PLAYERS.filter(p => p.team === tag).map(p => p.first).join(", "); }
function day12TotalsForPairing(){
  const d1 = Object.fromEntries(sortedDaily("day1").map(r => [r.player.id, r.total]));
  const d2 = Object.fromEntries(sortedDaily("day2").map(r => [r.player.id, r.total]));
  return PLAYERS.map(p => ({ playerId:p.id, team:p.team, total:(d1[p.id] || 0) + (d2[p.id] || 0) }));
}
function getDay3SinglesPairings(){
  const ranked = day12TotalsForPairing();
  const teamA = ranked.filter(r => r.team === "A").sort((a,b) => a.total - b.total);
  const teamB = ranked.filter(r => r.team === "B").sort((a,b) => a.total - b.total);
  const out = [];
  for(let i=0;i<Math.min(teamA.length, teamB.length); i++){
    out.push({ matchNo:i+1, a:teamA[i].playerId, b:teamB[i].playerId, aSeedTotal:teamA[i].total, bSeedTotal:teamB[i].total });
  }
  return out;
}
function getDay3GroupsFromSingles(){
  const pairs = getDay3SinglesPairings();
  const groups = [];
  for(let i=0;i<pairs.length;i+=2){
    const block = [];
    if (pairs[i]) block.push(pairs[i].a, pairs[i].b);
    if (pairs[i+1]) block.push(pairs[i+1].a, pairs[i+1].b);
    groups.push(block);
  }
  return groups;
}
function day3SinglesMatchResult(pair){
  const labelA = getPlayer(pair.a).first, labelB = getPlayer(pair.b).first;
  const psA = playerSummary("day3", pair.a), psB = playerSummary("day3", pair.b);
  let aUp = 0; const holes = [];
  for(let i=0;i<18;i++){
    const aVal = psA.holePoints[i] ?? 0, bVal = psB.holePoints[i] ?? 0;
    let winner = "H";
    if (aVal > bVal){ winner = "A"; aUp += 1; } else if (bVal > aVal){ winner = "B"; aUp -= 1; }
    const left = 18 - (i+1);
    holes.push({hole:i+1,aVal,bVal,winner,status:aUp,left});
  }
  let finalText = "Match halved"; let winnerTeam = "H";
  for(const h of holes){ if (Math.abs(h.status) > h.left){ const w = h.status>0?"A":"B"; finalText = `${w==="A"?labelA:labelB} wins ${Math.abs(h.status)} & ${h.left}`; winnerTeam=w; break; } }
  if (finalText === "Match halved"){ const s = holes[17].status; if (s > 0){ finalText = `${labelA} wins ${s} up`; winnerTeam="A"; } else if (s < 0){ finalText = `${labelB} wins ${Math.abs(s)} up`; winnerTeam="B"; } }
  return {labelA,labelB,holes,finalText,winnerTeam};
}
function teamMatchPointsSummary(){
  const out = { day1:{A:0,B:0,H:0}, day2:{A:0,B:0,H:0}, day3:{A:0,B:0,H:0}, total:{A:0,B:0,H:0} };
  for(const g of DAY_GAMES.day1){ const r = matchResult("day1", g); out.day1[r.winnerTeam] += 1; out.total[r.winnerTeam] += 1; }
  for(const g of DAY_GAMES.day2){ const r = matchResult("day2", g); out.day2[r.winnerTeam] += 1; out.total[r.winnerTeam] += 1; }
  for(const p of getDay3SinglesPairings()){ const r = day3SinglesMatchResult(p); out.day3[r.winnerTeam] += 1; out.total[r.winnerTeam] += 1; }
  return out;
}
function matchResult(day, game){
  const labelA = game.a.map(id => getPlayer(id).first).join(" & "), labelB = game.b.map(id => getPlayer(id).first).join(" & ");
  let aUp = 0; const holes = [];
  for(let i=0;i<18;i++){
    const aPoints = game.a.map(id => playerSummary(day,id).holePoints[i] ?? 0), bPoints = game.b.map(id => playerSummary(day,id).holePoints[i] ?? 0);
    const aVal = day==="day1" ? aPoints.reduce((x,y)=>x+y,0) : Math.max(...aPoints);
    const bVal = day==="day1" ? bPoints.reduce((x,y)=>x+y,0) : Math.max(...bPoints);
    let winner="H"; if (aVal>bVal){ winner="A"; aUp+=1; } else if (bVal>aVal){ winner="B"; aUp-=1; }
    const left = 18-(i+1); holes.push({hole:i+1,aVal,bVal,winner,status:aUp,left});
  }
  let finalText="Match halved"; let winnerTeam="H";
  for(const h of holes){ if (Math.abs(h.status) > h.left){ const w = h.status>0?"A":"B"; finalText = `${w==="A"?labelA:labelB} wins ${Math.abs(h.status)} & ${h.left}`; winnerTeam=w; break; } }
  if (finalText==="Match halved"){ const s = holes[17].status; if (s>0){ finalText = `${labelA} wins ${s} up`; winnerTeam="A"; } else if (s<0){ finalText = `${labelB} wins ${Math.abs(s)} up`; winnerTeam="B"; } }
  return {labelA,labelB,holes,finalText,winnerTeam};
}

// ── Match status banner for current player ──
function myMatchBanner(day){
  if(!state.currentPlayerId) return "";
  const pid = state.currentPlayerId;
  let result = null;
  if(day !== "day3"){
    const myGame = DAY_GAMES[day]?.find(g => [...g.a,...g.b].includes(pid));
    if(myGame) result = matchResult(day, myGame);
  } else {
    const pair = getDay3SinglesPairings().find(p => p.a===pid||p.b===pid);
    if(pair) result = day3SinglesMatchResult(pair);
  }
  if(!result) return "";

  // Work out current hole count and live status
  const ps = playerSummary(day, pid);
  const holesPlayed = ps.holesEntered;
  const lastHole = result.holes[Math.min(holesPlayed, 17)];
  const status = lastHole ? lastHole.status : 0;
  const myTeam = getPlayer(pid).team;
  const iAmA = result.labelA.includes(getPlayer(pid).first);
  const myStatus = iAmA ? status : -status;
  let statusText = "All square";
  if(myStatus > 0) statusText = `${myStatus} UP`;
  else if(myStatus < 0) statusText = `${Math.abs(myStatus)} DOWN`;
  const isHalved = myStatus === 0;
  const holesLeft = 18 - holesPlayed;

  return `<div class="match-banner ${isHalved?'halved':''}">
    <div>
      <div class="match-banner-status">${statusText}</div>
      <div class="match-banner-sub">${result.labelA} vs ${result.labelB}</div>
    </div>
    <div class="match-banner-holes">${holesPlayed}/18 · ${holesLeft} to play</div>
  </div>`;
}

async function chooseScore(value){
  const { day, playerId, holeNo } = modalState;
  const key = `${day}:${playerId}:${holeNo}`;
  state.scoreMap[key] = String(value || "").trim();

  // Flash animation on tile
  const tileBtn = document.querySelector(`[data-hole-key="${key}"]`);
  if(tileBtn){ tileBtn.classList.add("saved-pop"); setTimeout(()=>tileBtn.classList.remove("saved-pop"),400); }

  // Re-render modal with updated score
  renderScoreModal();
  _summaryCache = {};
  renderAll();

  // Activity feed
  if(value){
    const player = getPlayer(playerId);
    const course = COURSES[day]; const hole = course.holes[holeNo-1];
    const ps = playerSummary(day, playerId);
    const shots = shotsOnHole(ps.ph, hole.si);
    const pts = stablefordPoints(value, hole, shots);
    const icon = pts>=4?"🦅":pts===3?"🐦":pts===2?"⛳":pts===0?"💀":"🏌️";
    pushActivity(icon, `${player.first} scored ${value} on H${holeNo} (${pts} pts)`);
  }

  // Save — queue if offline
  if(!navigator.onLine){
    pendingScores.push({day, playerId, holeNo, value});
    setStatus("Saved offline. Will sync when connected.", "");
    return;
  }
  try{
    await secureUpsertScore(day, playerId, holeNo, value);
    setStatus("Saved.", "ok");
  }catch(e){
    pendingScores.push({day, playerId, holeNo, value});
    setStatus("Save failed — queued for retry.", "bad");
  }
}

// ── Score inputs (hole tile grid) ──
function scoreInputs(day, playerId){
  const c = COURSES[day], ps = playerSummary(day, playerId);
  let front9=0, back9=0;
  for(let h=1;h<=18;h++){
    const hole=c.holes[h-1], shots=shotsOnHole(ps.ph,hole.si), raw=scoreValue(day,playerId,h), pts=stablefordPoints(raw,hole,shots);
    if(pts!==null){ if(h<=9) front9+=pts; else back9+=pts; }
  }

  let html = `<div class="score-section-header">
    <div><div class="sh-label">Front 9</div><div class="sh-val">${front9}</div></div>
    <div><div class="sh-label">Back 9</div><div class="sh-val">${back9}</div></div>
    <div><div class="sh-label">Total</div><div class="sh-val">${ps.total}</div></div>
  </div>`;

  // Progress bar
  const pct = Math.round((ps.holesEntered/18)*100);
  html += `<div class="progress-label"><span>${ps.holesEntered}/18 holes</span><span>${pct}%</span></div>
  <div class="progress-bar-wrap"><div class="progress-bar-fill" style="width:${pct}%"></div></div>`;

  for(const [half, label] of [[[1,9],"Front 9"],[[10,18],"Back 9"]]){
    html += `<div class="hole-half-label">${label}</div><div class="hole-grid">`;
    for(let h=half[0];h<=half[1];h++){
      const hole=c.holes[h-1], shots=shotsOnHole(ps.ph,hole.si), raw=scoreValue(day,playerId,h), pts=stablefordPoints(raw,hole,shots);
      let cls='empty';
      if(raw){ const n=parseInt(raw); if(!isNaN(n)){ if(pts>=4) cls='great'; else if(pts>=3) cls='good'; else if(pts===0) cls='blob'; else cls='has-score'; } else if(raw==='X') cls='blob'; }
      const ptsLabel = pts===null ? '—' : pts===0 ? '0 pts' : `${pts} pts`;
      const ptsCls = pts!==null && pts>2 ? 'pos' : '';
      const key = `${day}:${playerId}:${h}`;
      html += `<div class="hole-tile">
        <div class="hole-tile-top"><span>H${h}</span><span>P${hole.par}</span></div>
        <div class="hole-tile-btn ${cls}" data-hole-key="${key}" onclick="openScoreModal('${day}','${playerId}',${h})">${raw||'·'}</div>
        <div class="hole-tile-pts ${ptsCls}">${ptsLabel}</div>
      </div>`;
    }
    html += `</div>`;
  }
  return html;
}

function saveCoursesToStorage(){
  const adminId = window._adminPlayerId || "mitchell";

  ["day1","day2","day3"].forEach(day => {

  <div class="card"><div class="card-title"><span class="icon">👥</span>Players</div><div style="overflow:auto;margin-top:10px"><table><thead><tr><th>Player</th><th>Team</th><th>Index</th></tr></thead><tbody>${PLAYERS.map(p=>`<tr><td>${p.first}</td><td>${p.team}</td><td>${p.hi.toFixed(1)}</td></tr>`).join("")}</tbody></table></div></div>`;
}

// ── Comp summary ──
function renderCompSummary(){
  const mp = teamMatchPointsSummary();
  const aTotal = mp.total.A, bTotal = mp.total.B;
  const leading = aTotal > bTotal ? "A" : bTotal > aTotal ? "B" : "tie";
  const activeDays = ["day3","day2","day1"];
  let focusDay = "day1";
  for(const d of activeDays){ if(sortedDaily(d).some(r=>r.holesEntered>0)){ focusDay=d; break; } }
  const daily = sortedDaily(focusDay).filter(r => r.holesEntered > 0).slice(0,3);
  const dayLabel = {day1:"Day 1",day2:"Day 2",day3:"Day 3"}[focusDay];
  let myMatchHtml = `<p style="font-size:13px;color:var(--muted)">No match data yet.</p>`;
  if(state.currentPlayerId){
    const pid = state.currentPlayerId;
    const myGame = DAY_GAMES[focusDay]?.find(g => [...g.a,...g.b].includes(pid));
    if(myGame){ const m=matchResult(focusDay, myGame); myMatchHtml=`<div class="my-match-text">${m.finalText}</div><div class="my-match-sub">${m.labelA} vs ${m.labelB}</div>`; }
    else if(focusDay==="day3"){ const pair=getDay3SinglesPairings().find(p=>p.a===pid||p.b===pid); if(pair){ const r=day3SinglesMatchResult(pair); myMatchHtml=`<div class="my-match-text">${r.finalText}</div><div class="my-match-sub">${r.labelA} vs ${r.labelB}</div>`; } }
  }
  $("compSummary").innerHTML = `
    <div class="comp-block"><h4>🏆 Match Points</h4><div class="team-score-row ${leading==="A"?"leading":leading==="tie"?"tied":"trailing"}"><span>Team A</span><span>${aTotal}</span></div><div class="team-score-row ${leading==="B"?"leading":leading==="tie"?"tied":"trailing"}"><span>Team B</span><span>${bTotal}</span></div><p style="font-size:11px;color:var(--muted);margin-top:6px">${leading==="tie"?"All square":leading==="A"?"A leading":"B leading"} · D1:${mp.day1.A}-${mp.day1.B} D2:${mp.day2.A}-${mp.day2.B} D3:${mp.day3.A}-${mp.day3.B}</p></div>
    <div class="comp-block"><h4>📋 ${dayLabel} Top 3</h4>${daily.length===0?`<p style="font-size:13px;color:var(--muted)">No scores yet.</p>`:daily.map(r=>`<div class="lb-row ${r.player.id===state.currentPlayerId?"lb-me":""}"><span class="lb-pos">${r.position}</span><span class="lb-name">${r.player.first}</span><span class="lb-pts">${r.total}pts</span></div>`).join("")}</div>
    <div class="comp-block"><h4>⛳ My Match</h4>${myMatchHtml}</div>`;
}

function renderAll(){ _summaryCache = {}; renderCompSummary(); renderDay("day1"); renderDay("day2"); renderDay("day3"); renderOverall(); renderSetup(); }

function subscribeRealtime(){
  if (channel) sb.removeChannel(channel);
  channel = sb.channel("scores-live-v3").on("postgres_changes",{event:"*",schema:"public",table:"scores",filter:`tournament_id=eq.${state.tournamentId}`},payload => {
    const row = payload.new || payload.old;
    if (row){
      state.scoreMap[`${row.day_key}:${row.player_id}:${row.hole_no}`] = row.score_value || "";
      $("syncState").textContent = "● Live";
      // Activity for other players' scores
      if(row.player_id !== state.currentPlayerId){
        const p = getPlayer(row.player_id);
        if(p) pushActivity("📡", `${p.first} updated H${row.hole_no} on ${row.day_key.replace("day","Day ")}`);
      }
      renderAll();
    }
  }).subscribe();
}

async function enterApp(){
  try{
    const ok = await initSupabase(); if (!ok) return;
    const signIn = await secureSignIn(); if (!signIn || !signIn.success) throw new Error(signIn?.message || "Sign in failed");
    const code = $("tournamentCodeInput").value.trim(), playerId = $("playerSelect").value, adminCode = $("adminCodeInput").value.trim(), t = await loadTournament(code);
    state.tournamentId = t.id; state.tournamentSlug = code; state.currentPlayerId = playerId; state.adminCode = adminCode; state.isAdmin = !!signIn.is_admin;
    await loadScores(); subscribeRealtime();
    $("whoAmI").textContent = "👤 " + getPlayer(playerId).first;
    $("whoAmIApp").textContent = getPlayer(playerId).first;
    $("accessSummary").textContent = state.isAdmin ? "Admin access — can edit any player." : "Scorer for your team's players in your group.";
    $("appBarRight").style.display = "flex";
    ssHideScreen();
    $("mainApp").classList.remove("hidden");
    $("bottomNav").classList.remove("hidden");
    $("syncState").textContent = "● Live";
    setStatus("Connected. Live scores syncing.", "ok");
    const adminId = window._adminPlayerId || "mitchell";
    const isAdmin = playerId === adminId || state.isAdmin;
    $("tab_setup").style.display = isAdmin ? "" : "none";
    $("bnav_setup").style.display = isAdmin ? "" : "none";
    localStorage.setItem("cyprusTourV3Login", JSON.stringify({ code, playerId }));
  }catch(e){
    console.error("enterApp error:", e);
    setStatus("Could not enter app: " + (e.message || e), "bad");
    return;
  }
  try{ renderAll(); showSection("day1"); }
  catch(e){ console.error("renderAll error:", e); setStatus("Logged in but render error: " + (e.message || e), "bad"); }
}

function logOut(){
  state.currentPlayerId = null; state.isAdmin = false; state.scoreMap = {}; state.tournamentId = null;
  if(channel && sb){ sb.removeChannel(channel); channel = null; }
  $("mainApp").classList.add("hidden");
  $("bottomNav").classList.add("hidden");
  $("adminCodeInput") && ($("adminCodeInput").value = "");
  toggleAdminField();
  localStorage.removeItem("cyprusTourV3Login");
  // Go back to sign-in step of setup screen
  ss.step = SS_STEPS.findIndex(s=>s.id==="signin");
  ssShowScreen();
  ssRender();
}

function ssRender(){
  var step = SS_STEPS[ss.step];
  var total = SS_STEPS.length;

  document.getElementById("ss_tourName").textContent = ss.data.tournament.name || "Golf Tour Setup";
  document.getElementById("ss_tourDates").textContent = ss.data.tournament.dates || "";
  document.getElementById("ss_stepBadge").textContent = step.id==="signin" ? "Sign In" : (ss.step + " / " + (total-1));

  document.getElementById("ss_dots").innerHTML = Array.from({length:dotSteps},function(_,i){
    var w=i===ss.step?24:8, bg=i===ss.step?"#f0c040":i<ss.step?"rgba(240,192,64,.4)":"rgba(255,255,255,.2)";

  if(step.id==="holes")      body = ssHoles();
  if(step.id==="games")      body = ssGames();
  if(step.id==="scorers")    body = ssScorers();

  // Inject nav buttons at bottom of content (no z-index issues)

    var backBtn = ss.step > 0 ? '<button onclick="ssBack()" style="flex:0 0 auto;padding:16px 22px;border-radius:14px;border:1.5px solid rgba(255,255,255,.3);background:rgba(255,255,255,.12);color:white;font-size:14px;font-weight:800;cursor:pointer">← Back</button>' : "";

      + backBtn
      + '<button onclick="ssNext()" style="flex:1;max-width:220px;margin:0 auto;padding:16px 24px;border-radius:14px;border:none;background:#f0c040;color:#042e19;font-size:16px;font-weight:900;cursor:pointer;letter-spacing:.04em;text-transform:uppercase">' + btnLabel + '</button>'

function ssBack(){
  if(ss.step>0){ ss.step--; ssRender(); }
}

function ssNext(){
  try {
  var stepId = SS_STEPS[ss.step].id;

  // Read all player fields from DOM before any validation
  if(stepId==="players") ssFlushPlayers();

  // Validate
  if(stepId==="tournament"){
    var name = (document.getElementById("ss_tname")||{}).value||"";
    name = name.trim() || ss.data.tournament.name;
    if(!name){ ssError("Please enter a tournament name."); return; }
    ss.data.tournament.name = name;
    if(!ss.data.tournament.startDate){ ssError("Please select a start date."); return; }
  }
  if(stepId==="players"){
    ssFlushPlayers();
    ss.data.players = ss.data.players.filter(function(p){ return p.first && p.first.trim()!==""; });
    if(ss.data.players.length<2){ ssError("Please add at least 2 players."); return; }
    var a = ss.data.players.filter(function(p){return p.team==="A";}).length;
    var b = ss.data.players.filter(function(p){return p.team==="B";}).length;
    if(a!==b){ ssError("Teams must be equal — A: "+a+", B: "+b); return; }
  }
  if(stepId==="courses"){
    var days = ["day1","day2","day3"].slice(0,ss.data.tournament.numDays);
    for(var di=0;di<days.length;di++){
      var d = days[di];
      var cn = (document.getElementById("sc_"+d+"_name")||{}).value||"";
      cn = cn.trim() || ss.data.courses[d].name;
      ss.data.courses[d].name = cn;
      if(!cn){ ssError("Please enter a course name for Day "+(di+1)); return; }
    }
  }

  // Save current step values
  if(stepId==="tournament"){
    var tn = document.getElementById("ss_tname"); if(tn) ss.data.tournament.name=tn.value.trim();
    var td = parseInt((document.getElementById("ss_tdays")||{}).value); if(!isNaN(td)) ss.data.tournament.numDays=td;
    ssUpdateDates();
  }
  if(stepId==="courses"){
    ["day1","day2","day3"].forEach(function(d){
      var n=document.getElementById("sc_"+d+"_name"); if(n) ss.data.courses[d].name=n.value.trim();
      var r=document.getElementById("sc_"+d+"_rating"); if(r) ss.data.courses[d].rating=parseFloat(r.value)||ss.data.courses[d].rating;
      var sl=document.getElementById("sc_"+d+"_slope"); if(sl) ss.data.courses[d].slope=parseInt(sl.value)||ss.data.courses[d].slope;
      var p=document.getElementById("sc_"+d+"_par"); if(p) ss.data.courses[d].par=parseInt(p.value)||ss.data.courses[d].par;
      var al=document.getElementById("sc_"+d+"_allowance"); if(al) ss.data.courses[d].allowance=parseInt(al.value)||ss.data.courses[d].allowance;
    });
  }

  // Advance
  var isLast = ss.step >= SS_STEPS.length-2;
  if(isLast){
    ssApplyAndSave();
    ssSaveAndFinish();
  } else {
    ss.step++;
    ssRender();
  }
  } catch(e) {
    alert("ERROR in ssNext: " + e.message + "\n\nStack: " + e.stack);
  }
}

function ssError(msg){
  var existing = document.getElementById("ss_error");
  if(existing) existing.remove();
  var el = document.createElement("div");
  el.id="ss_error";
  el.style.cssText="background:#fff0ed;border:1px solid #f1c8c1;color:#9b2f24;border-radius:12px;padding:12px 14px;font-size:13px;font-weight:700;margin-bottom:12px";
  el.textContent="⚠️ "+msg;
  var content = document.getElementById("ss_content");
  content.insertBefore(el, content.firstChild);
  content.scrollTop=0;
  setTimeout(function(){if(el.parentNode)el.remove();},5000);
}

function ssUpdateDates(){
  var start=ss.data.tournament.startDate||"", end=ss.data.tournament.endDate||"";
  if(!start){ ss.data.tournament.dates=""; return; }
  function fmt(d){ if(!d)return""; var parts=d.split("-"); var months=["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"]; return parseInt(parts[2])+" "+months[parseInt(parts[1])-1]+" "+parts[0]; }
  ss.data.tournament.dates = (!end||start===end) ? fmt(start) : fmt(start)+" \u2013 "+fmt(end);
  var prev=document.getElementById("ss_datepreview"); if(prev) prev.textContent=ss.data.tournament.dates;
  var hdr=document.getElementById("ss_tourDates"); if(hdr) hdr.textContent=ss.data.tournament.dates;
}

    if(hiEl)   ss.data.players[i].hi=parseFloat(hiEl.value)||0;

  }

  var aCount=ss.data.players.filter(function(p){return p.team==="A";}).length;

  var balanced=aCount===bCount;
  var balColor=balanced?"#86efac":"#fca5a5";
  var balMsg=balanced?"\u2713 Balanced \u2014 "+aCount+" vs "+bCount:"\u26a0 Unequal \u2014 A: "+aCount+", B: "+bCount;
  var rows="";
  for(var i=0;i<ss.data.players.length;i++){
    var p=ss.data.players[i];

function ssGames(){

  var labels={day1:"Day 1",day2:"Day 2",day3:"Day 3"};
  if(!ss.data.games.day3) ss.data.games.day3=[];
  days.forEach(function(day){
    while(ss.data.games[day].length<numGames) ss.data.games[day].push({name:"Game "+(ss.data.games[day].length+1),a:[],b:[]});
    ss.data.games[day]=ss.data.games[day].slice(0,numGames);

function ssApplyAndSave(){

  ss.data.players.forEach(function(p){

  });
  var mitchell=PLAYERS.find(function(p){return p.id==="mitchell"||p.first.toLowerCase()==="mitchell";});
  ss.adminId=(mitchell&&mitchell.id)||PLAYERS[0].id||"mitchell";
  window._adminPlayerId=ss.adminId;
  window._scorers=ss.data.scorers||{};
  ["day1","day2","day3"].forEach(function(day){
    var wc=ss.data.courses[day];
    COURSES[day]={name:wc.name||day,par:wc.par,rating:wc.rating,slope:wc.slope,allowance:wc.allowance,tees:wc.tees,holes:ss.data.holes[day].map(function(h){return{par:h.par,si:h.si};})};
  });
  DAY_GAMES.day1=ss.data.games.day1.map(function(g,i){return{name:"Game "+(i+1),a:g.a.filter(Boolean),b:g.b.filter(Boolean)};}).filter(function(g){return g.a.length&&g.b.length;});
  DAY_GAMES.day2=ss.data.games.day2.map(function(g,i){return{name:"Game "+(i+1),a:g.a.filter(Boolean),b:g.b.filter(Boolean)};}).filter(function(g){return g.a.length&&g.b.length;});
  DAY_GAMES.day3=(ss.data.games.day3||[]).map(function(g,i){return{name:"Game "+(i+1),a:g.a.filter(Boolean),b:g.b.filter(Boolean)};}).filter(function(g){return g.a.length&&g.b.length;});
  document.querySelectorAll(".app-bar-title strong").forEach(function(el){el.textContent=ss.data.tournament.name;});
  _summaryCache={};
}

async function ssSaveToSupabase(){
  if(!sb) return false;
  var slug=ss.data.tournament.slug||"cyprus-tour-2026";
  ss.data.tournament.slug=slug;
  var config={tournament:ss.data.tournament,players:ss.data.players,games:ss.data.games,courses:ss.data.courses,holes:ss.data.holes,scorers:ss.data.scorers||{},version:3};
  var result=await sb.from("tournament_config").upsert({tournament_slug:slug,config:config,updated_at:new Date().toISOString()},{onConflict:"tournament_slug"});
  if(result.error){console.error("ssSaveToSupabase:",result.error);return false;}
  return true;
}

async function ssLoadFromSupabase(slug){
  if(!sb) return false;
  slug=slug||"cyprus-tour-2026";
  try{
    var result=await sb.from("tournament_config").select("config").eq("tournament_slug",slug).maybeSingle();
    if(!result||result.error||!result.data||!result.data.config) return false;
    var cfg=result.data.config;
    if(!cfg||!cfg.players||!cfg.players.length) return false;
    ss.data.tournament=cfg.tournament||ss.data.tournament;
    ss.data.players=cfg.players;
    ss.data.games=cfg.games||ss.data.games;
    ss.data.courses=cfg.courses||ss.data.courses;
    ss.data.holes=cfg.holes||ss.data.holes;
    ss.data.scorers=cfg.scorers||{};
    ssApplyAndSave();
    return true;
  }catch(e){console.warn("ssLoadFromSupabase:",e);return false;}
}

  var numGames = ss.data.games.day1.length;
  var inp = 'width:100%;padding:10px;border-radius:10px;border:1.5px solid rgba(255,255,255,.2);background:rgba(20,50,30,1);color:white;font-size:13px';
  if(!ss.data.scorers) ss.data.scorers = {};

  var html = '<div style="margin-bottom:20px">'
    +'<h2 style="font-family:Playfair Display,serif;font-size:24px;font-weight:900;color:white">Designated Scorers</h2>'
    +'<p style="color:rgba(255,255,255,.7);font-size:13px;margin-top:4px">In traditional golf, each team scores for the <strong style="color:white">opposing team</strong>. Choose one scorer from each team per group per day.</p>'
    +'</div>';

  days.forEach(function(day){
    var games = ss.data.games[day];
    if(!games || !games.length) return;
    html += '<div style="font-size:13px;font-weight:800;color:#f0c040;text-transform:uppercase;letter-spacing:.06em;margin:16px 0 10px">'+labels[day]+'</div>';

    for(var gi=0; gi<games.length; gi++){
      var game = games[gi];
      var key = day+'_game'+gi;
      if(!ss.data.scorers[key]) ss.data.scorers[key] = {A:'', B:''};
      var sc = ss.data.scorers[key];

      // Team A scorer scores for Team B players, and vice versa
      var teamAPlayers = game.a.map(function(id){ return ss.data.players.find(function(p){return p.id===id;}); }).filter(Boolean);
      var teamBPlayers = game.b.map(function(id){ return ss.data.players.find(function(p){return p.id===id;}); }).filter(Boolean);

      var aOpts = '<option value="">— select —</option>' + teamAPlayers.map(function(p){ return '<option value="'+p.id+'"'+(sc.A===p.id?' selected':'')+'>'+p.first+'</option>'; }).join('');
      var bOpts = '<option value="">— select —</option>' + teamBPlayers.map(function(p){ return '<option value="'+p.id+'"'+(sc.B===p.id?' selected':'')+'>'+p.first+'</option>'; }).join('');

      html += '<div style="background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.12);border-radius:16px;padding:14px;margin-bottom:10px">'
        +'<div style="font-size:13px;font-weight:800;color:white;margin-bottom:12px">Game '+(gi+1)+'</div>'
        +'<div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">'
        +'<div>'
          +'<div style="font-size:11px;font-weight:800;color:#fcd34d;text-transform:uppercase;letter-spacing:.04em;margin-bottom:6px">Team A scorer</div>'
          +'<div style="font-size:11px;color:rgba(255,255,255,.5);margin-bottom:6px">Scores for Team B</div>'
          +'<select onchange="ss.data.scorers[\"'+key+'\"].A=this.value" style="'+inp+'">'+aOpts+'</select>'
        +'</div>'
        +'<div>'
          +'<div style="font-size:11px;font-weight:800;color:#86efac;text-transform:uppercase;letter-spacing:.04em;margin-bottom:6px">Team B scorer</div>'
          +'<div style="font-size:11px;color:rgba(255,255,255,.5);margin-bottom:6px">Scores for Team A</div>'
          +'<select onchange="ss.data.scorers[\"'+key+'\"].B=this.value" style="'+inp+'">'+bOpts+'</select>'
        +'</div>'
        +'</div></div>';
    }
  });

  return html;
}

async function ssSaveAndFinish(){
  // Show saving state in content
  var saveBtn = document.querySelector('#ss_content button[onclick="ssNext()"]');
  if(saveBtn){ saveBtn.textContent="Saving…"; saveBtn.disabled=true; }
  var ok = await ssSaveToSupabase();
  if(!ok){
    if(saveBtn){ saveBtn.disabled=false; saveBtn.textContent="Save & Sign In →"; }
    ssError("Could not save to Supabase. Check your connection.");
    return;
  }
  localStorage.setItem("cyprusTourSetupDone","1");
  ss.step = SS_STEPS.findIndex(function(s){return s.id==="signin";});
  ssRender();
}



window.addEventListener("DOMContentLoaded", async () => {
  if(localStorage.getItem("cyprusDark")){ isDark=true; document.body.classList.add("dark"); var btn=document.querySelector(".dark-toggle"); if(btn) btn.textContent="☀️"; }
  setupOfflineDetection();

  // Clear all stale localStorage from previous sessions
  localStorage.removeItem("cyprusTourSetupDone");
  localStorage.removeItem("cyprusTourSetup");
  localStorage.removeItem("cyprusTourCourses");
  localStorage.removeItem("cyprusTourV3Login");

  // Init Supabase silently in background
  try{
    if(window.APP_CONFIG && window.APP_CONFIG.supabaseUrl){
      sb = window.supabase.createClient(window.APP_CONFIG.supabaseUrl, window.APP_CONFIG.supabaseAnonKey);
    }
  }catch(e){ console.warn("Supabase init:", e); }

  // Always start at welcome screen - no loading, no Supabase query
  ssShowScreen();
  ss.step = 0;
  try {
    ssRender();
  } catch(e) {
    document.getElementById("ss_content").innerHTML = "<p style='color:red;padding:20px'>Error in ssRender: " + e.message + "<br><small>" + e.stack + "</small></p>";
  }
});
</script>
</body>
</html>
